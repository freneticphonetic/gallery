name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "Android/**"
      - ".github/workflows/build_android.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "Android/**"
      - ".github/workflows/build_android.yaml"

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_apk:
    name: Build installable APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./Android/src

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Android SDK Platform 37
        run: |
          echo "y" | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-37.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Package APK and checksum
        run: |
          artifact_dir="$GITHUB_WORKSPACE/artifacts/apk"
          apk_path="app/build/outputs/apk/release/app-release.apk"
          test -f "$apk_path"
          mkdir -p "$artifact_dir"
          cp "$apk_path" "$artifact_dir/Offline-AI-Gallery.apk"
          cd "$artifact_dir"
          sha256sum Offline-AI-Gallery.apk > Offline-AI-Gallery.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: offline-ai-gallery-apk-${{ github.run_number }}
          path: artifacts/apk/
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
